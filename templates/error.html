<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error {{ code }} — MedAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="text-align:center;max-width:480px;padding:40px">
    <div style="font-family:var(--font-display);font-size:6rem;font-weight:800;color:var(--border);line-height:1;margin-bottom:16px">{{ code }}</div>
    <div style="font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:12px">
      {% if code == 404 %}Page Not Found
      {% elif code == 429 %}Rate Limit Exceeded
      {% else %}Server Error{% endif %}
    </div>
    <div style="color:var(--text-dim);font-size:0.875rem;margin-bottom:28px;line-height:1.6">{{ message }}</div>
    <a href="/" class="btn btn-primary">← Return to Dashboard</a>
  </div>
</body>
</html>
